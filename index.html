<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIBO: Rumo ao Hexa⚽</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Kanit:ital,wght@0,800;1,800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.5); 
            --primary-blue: #002776; 
            --brazil-yellow: #fed100; 
            --whatsapp-green: #25D366;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Kanit', sans-serif; background-color: #009739; 
            touch-action: none; /* 브라우저 기본 제스처 방지 */
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover; background-color: #009739;
        }

        canvas { 
            display: block; width: 100%; height: 100%; 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 100; background: rgba(0,0,0,0.5); 
        }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px; padding: 30px 20px; width: 85%; max-width: 400px;
            text-align: center; border: 1.5px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .glass-box h2 { font-family: 'Luckiest Guy'; color: var(--primary-blue); font-size: 2rem; margin-top: 0; }
        .glass-box p { color: #000; font-weight: 700; line-height: 1.5; font-size: 1rem; margin-bottom: 25px; white-space: pre-line; }

        .btn-play {
            background: var(--primary-blue); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1.4rem;
            font-family: 'Kanit'; font-weight: 800; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,39,118,0.5);
        }

        /* 카운트다운 레이어 */
        #countdown-overlay {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; width: 100%; z-index: 150; font-family: 'Luckiest Guy'; 
            color: var(--brazil-yellow); -webkit-text-stroke: 3px var(--primary-blue); 
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }
        #countdown-mode { font-size: 2rem; color: white; margin-bottom: 10px; -webkit-text-stroke: 0; }
        #countdown-msg { font-size: 3rem; margin-bottom: 10px; color: white; -webkit-text-stroke: 0; }
        #countdown-num { font-size: 10rem; line-height: 1; display: inline-block; padding: 0.2em; }

        /* HUD */
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 50; display: flex; flex-direction: column; align-items: center; }
        #score-board { font-family: 'Luckiest Guy'; font-size: 4rem; margin: 0; color: var(--brazil-yellow); -webkit-text-stroke: 2px var(--primary-blue); }
        #combo-board { font-size: 1.5rem; color: #ffffff; background: rgba(0,0,0,0.3); display: inline-block; padding: 5px 25px; border-radius: 30px; font-weight: 800; }

        #judgment-text {
            position: absolute; width: 100%; text-align: center; top: 35%;
            font-family: 'Luckiest Guy'; font-size: 3rem; opacity: 0; 
            pointer-events: none; z-index: 60; -webkit-text-stroke: 1px var(--primary-blue);
        }

        /* 게임오버 슬림 디자인 */
        #game-over {
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            flex-direction: column; justify-content: center; align-items: center; 
            color: white; z-index: 250; text-align: center;
            padding: 10px; box-sizing: border-box;
        }
        #game-over h1 { font-size: 1.8rem !important; margin: 0 0 5px 0 !important; color: var(--brazil-yellow); font-family: 'Luckiest Guy'; }
        #game-over h2 { font-size: 1rem !important; margin: 0 0 8px 0 !important; }
        #final-result { font-size: 1rem !important; margin: 8px 0 !important; line-height: 1.2; font-weight: 800; }

        /* 공통 버튼 스타일 */
        .btn-action { 
            width: 85%; max-width: 280px; height: 42px; padding: 0 !important; 
            margin: 4px !important; border: none; border-radius: 50px; 
            font-family: 'Kanit'; font-weight: 800; font-size: 0.9rem !important;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            text-decoration: none;
        }
        .btn-retry { background: var(--brazil-yellow); color: var(--primary-blue); }
        .btn-ranking { background: #ffffff; color: var(--primary-blue); border: 2px solid var(--primary-blue); }
        .btn-whatsapp { background: var(--whatsapp-green); color: white; }
        .btn-link { background: var(--primary-blue) !important; color: white !important; border: 2px solid var(--brazil-yellow) !important; }
        .btn-close { background: #888888; color: white; }

        /* 랭킹 모달 */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
            z-index: 300; justify-content: center; align-items: center;
        }
        .rank-box {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; padding: 25px; width: 85%; max-width: 340px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .input-nickname {
            width: 90%; padding: 12px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 15px; font-family: 'Kanit'; font-size: 1.1rem; text-align: center; outline: none;
        }
        .rank-table-wrapper { width: 100%; max-height: 200px; overflow-y: auto; margin: 10px 0; border-radius: 10px; }
        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table th { position: sticky; top: 0; background: var(--primary-blue); color: white; padding: 8px; font-size: 0.8rem; text-align: center; }
        .rank-table td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; color: #333; text-align: center; vertical-align: middle; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen" class="overlay">
        <div class="glass-box">
            <h2 id="txt-intro-title">CARREGANDO...</h2>
            <p id="txt-intro-desc">Aguarde o carregamento!</p>
            <button class="btn-play" onclick="triggerSequence('START')" id="txt-btn-play" style="display:none;">JOGAR AGORA</button>
        </div>
    </div>

    <div id="countdown-overlay" class="overlay">
        <div id="countdown-mode"></div>
        <div id="countdown-msg">PRONTO?</div>
        <div id="countdown-num">3</div>
    </div>

    <div id="hud">
        <p id="score-board">0</p>
        <div id="combo-board">COMBO 0</div>
    </div>
    <div id="judgment-text"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="game-over">
        <h1 id="txt-over-title"></h1>
        <h2 id="txt-over-sub"></h2>
        <p id="final-result"></p>
        <button class="btn-action btn-retry" onclick="resetGame()" id="txt-btn-retry">JOGAR DE NOVO</button>
        <button class="btn-action btn-ranking" onclick="openRankingInput()" id="btn-save-rank">SALVAR RECORDE</button> 
        <button class="btn-action btn-whatsapp" id="share-wa">COMPARTILHAR</button>
        <button id="txt-btn-link" class="btn-action btn-link" onclick="window.open(LOCALE.linkUrl, '_blank')"></button>
    </div>

    <div id="modal-rank-input" class="modal-overlay">
        <div class="rank-box">
            <h2 style="font-family:'Luckiest Guy'; color:var(--primary-blue); margin-bottom:15px;">NOVO RECORDE!</h2>
            <input type="text" id="nickname" class="input-nickname" placeholder="Nickname" maxlength="10">   
            <button class="btn-action btn-retry" onclick="submitScore()" style="width:90%">ENVIAR</button>     
            <button class="btn-action btn-close" onclick="closeModal('modal-rank-input')" style="width:90%">FECHAR</button>
        </div>
    </div>

    <div id="modal-rank-board" class="modal-overlay">
        <div class="rank-box">
            <h2 style="font-family:'Luckiest Guy'; color:var(--primary-blue)">TOP CRAQUES</h2>
            <div class="rank-table-wrapper">
                <table class="rank-table">
                    <thead><tr><th>Rank</th><th>Nome</th><th>Gols</th><th>Combo</th></tr></thead>
                    <tbody id="rank-list-body"></tbody>
                </table>
            </div>
            <button class="btn-action btn-retry" onclick="closeModal('modal-rank-board')" style="width:90%">OK</button>
        </div>
    </div>
</div>

<script>
    const LOCALE = {
        introTitle: "COMO JOGAR",
        introDesc: "Toque na tela quando a bola\nchegar na boné do DIBO!\nPERFEITO: 10 pts / BOM: 5 pts\n\nNo modo DIFÍCIL,\nMEXA o DIBO\nde um lado ao outro!",
        btnPlay: "JOGAR AGORA",
        msgEasy: "TOQUE NA TELA!",
        msgHard: "AGORA, MEXA DIBO!",
        msgExtreme: "MAIS RÁPIDO!",
        overTitle: "SÓ VAMOS!",
        overSub: "Rumo ao Hexa⚽",
        btnRetry: "JOGAR DE NOVO",
        btnShare: "COMPARTILHAR",
        btnLink: "Ainda não conhece o DIBO?👀",
        linkUrl: "https://www.instagram.com/deboacomdibo",
        shareMsg: (s, c) => `Fiz ${s} gols e ${c} combos no DIBO: Rumo ao Hexa⚽ Consegue superar?`
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownMsg = document.getElementById('countdown-msg');
    const countdownMode = document.getElementById('countdown-mode');
    const countdownNum = document.getElementById('countdown-num');
    const overScreen = document.getElementById('game-over');
    const judgmentEl = document.getElementById('judgment-text');
    const scoreEl = document.getElementById('score-board');
    const comboEl = document.getElementById('combo-board');

    // 이미지 로딩
    const images = { idle: new Image(), hit: new Image(), fail: new Image(), ball: new Image() };
    let loadedImages = 0;
    function onImageLoad() {
        loadedImages++;
        if (loadedImages === 4) {
            document.getElementById('txt-btn-play').style.display = 'inline-block';
            initTexts();
        }
    }
    images.idle.onload = onImageLoad; images.hit.onload = onImageLoad;
    images.fail.onload = onImageLoad; images.ball.onload = onImageLoad;
    images.idle.src = 'dibo_idle.png'; images.hit.src = 'dibo_hit.png';
    images.fail.src = 'dibo_fail.png'; images.ball.src = 'ball.png';

    let score = 0, combo = 0, maxCombo = 0, isGameOver = false, gameState = 'INTRO';
    let currentDiboImg = images.idle, particles = [], balls = [], currentMode = 'EASY';
    const GRAVITY = { EASY: 0.35, HARD: 0.4, EXTREME: 0.4 };
    let dibo = { w: 0, h: 0, x: 0, y: 0, targetX: 0 };

    function initTexts() {
        const setText = (id, txt) => { if(document.getElementById(id)) document.getElementById(id).innerText = txt; };
        setText('txt-intro-title', LOCALE.introTitle); setText('txt-intro-desc', LOCALE.introDesc);
        setText('txt-btn-play', LOCALE.btnPlay); setText('txt-over-title', LOCALE.overTitle);
        setText('txt-over-sub', LOCALE.overSub); setText('txt-btn-retry', LOCALE.btnRetry);
        setText('share-wa', LOCALE.btnShare); setText('txt-btn-link', LOCALE.btnLink);
    }

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        dibo.h = canvas.height * 0.5; dibo.w = dibo.h * (220 / 360);
        dibo.x = canvas.width / 2 - dibo.w / 2; dibo.targetX = dibo.x;
        dibo.y = canvas.height - dibo.h - 40;
    }
    window.addEventListener('resize', resize); resize();

    function triggerSequence(type) {
        gameState = 'SEQUENCE';
        document.getElementById('intro-screen').style.display = 'none';
        countdownOverlay.style.display = 'flex';
        countdownNum.style.display = 'none';
        
        if(type === 'START') { countdownMsg.innerText = LOCALE.msgEasy; countdownMode.innerText = "FÁCIL"; }
        else if(type === 'HARD') { countdownMsg.innerText = LOCALE.msgHard; countdownMode.innerText = "DIFÍCIL"; }
        else { countdownMsg.innerText = LOCALE.msgExtreme; countdownMode.innerText = "EXTREMO"; }

        setTimeout(() => {
            countdownMsg.innerText = "PRONTO?"; countdownMode.innerText = ""; countdownNum.style.display = 'block';
            let count = 3; countdownNum.innerText = count;
            const timer = setInterval(() => {
                count--;
                if (count > 0) countdownNum.innerText = count;
                else {
                    clearInterval(timer); countdownOverlay.style.display = 'none';
                    gameState = 'PLAYING'; balls = []; spawnBall();
                    if(currentMode === 'EXTREME') spawnBall(800);
                }
            }, 1000);
        }, 1200);
    }

    function spawnBall(delay = 0) {
        setTimeout(() => {
            if(isGameOver || gameState !== 'PLAYING') return;
            balls.push({
                x: (currentMode === 'EASY') ? canvas.width/2 : Math.random()*(canvas.width-120)+60,
                y: -50, r: Math.min(canvas.width * 0.12, 45), sx: 0, sy: 0, active: true, alreadyHit: false
            });
        }, delay);
    }

    // 터치/클릭 최적화 핸들러
    function handleInput(e) {
        if (gameState !== 'PLAYING' || isGameOver) return;
        if (e.type === 'mousedown' && 'ontouchstart' in window) return;

        const inputX = (e.touches ? e.touches[0].clientX : e.clientX);
        if (currentMode !== 'EASY') dibo.targetX = inputX - dibo.w / 2;

        balls.forEach(ball => {
            if (ball.active && !ball.alreadyHit) { 
                const distX = Math.abs(ball.x - (dibo.x + dibo.w / 2));
                const headY = dibo.y + (dibo.h * 0.05); 
                const distY = ball.y + ball.r - headY;

                if (distX < dibo.w * 0.6 && Math.abs(distY) < 80) {
                    const absDistY = Math.abs(distY);
                    const isPerfect = absDistY < 25;
                    const isGood = absDistY < 80;

                    if (isPerfect || isGood) {
                        ball.alreadyHit = true;
                        if (isPerfect) {
                            score += 10; combo++;
                            if(combo > maxCombo) maxCombo = combo;
                            if (combo > 0 && combo % 10 === 0) {
                                score += 20; showJudgment('COMBO BÔNUS +20!', '#ff3300');
                            } else showJudgment('PERFEITO!', '#fed100');
                        } else {
                            score += 5; showJudgment('BOM!', '#ffffff');
                        }
                        ball.sy = -13; ball.sx = (ball.x - (dibo.x + dibo.w / 2)) * 0.2;
                        currentDiboImg = images.hit;
                        setTimeout(() => { if(!isGameOver) currentDiboImg = images.idle; }, 250);
                        createParticles(ball.x, ball.y, isPerfect ? 15 : 8);
                        updateDifficulty();
                    }
                }
            }
        });
    }

    canvas.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); handleInput(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { if (e.cancelable) e.preventDefault(); handleInput(e); }, {passive: false});
    canvas.addEventListener('mousedown', handleInput);

    function updateDifficulty() {
        if (score >= 200 && currentMode !== 'EXTREME') { currentMode = 'EXTREME'; triggerSequence('EXTREME'); }
        else if (score >= 100 && score < 200 && currentMode !== 'HARD') { currentMode = 'HARD'; triggerSequence('HARD'); }
    }

    function update() {
        if (gameState !== 'PLAYING' || isGameOver) return;
        if (currentMode !== 'EASY') dibo.x += (dibo.targetX - dibo.x) * 0.17;
        balls.forEach((ball, idx) => {
            ball.sy += GRAVITY[currentMode]; ball.x += ball.sx; ball.y += ball.sy;
            if (ball.x < ball.r || ball.x > canvas.width - ball.r) ball.sx *= -1;
            if (ball.y > canvas.height - 30) endGame();
            if (ball.sy < 0 && ball.y < -100) { balls.splice(idx, 1); spawnBall(200); }
        });
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; if (p.life <= 0) particles.splice(i, 1); });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let drawImg = isGameOver ? images.fail : currentDiboImg;
        if (drawImg.complete) ctx.drawImage(drawImg, dibo.x, dibo.y, dibo.w, dibo.h);
        balls.forEach(ball => {
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.x * 0.03);
            if (images.ball.complete) ctx.drawImage(images.ball, -ball.r, -ball.r, ball.r*2, ball.r*2);
            ctx.restore();
        });
        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 1; scoreEl.innerText = score; comboEl.innerText = `COMBO ${combo}`;
        update(); requestAnimationFrame(draw);
    }

    function showJudgment(txt, color) {
        judgmentEl.innerText = txt; judgmentEl.style.color = color; judgmentEl.style.opacity = '1';
        setTimeout(() => { judgmentEl.style.opacity = '0'; }, 500);
    }

    function createParticles(x, y, count) {
        for (let i = 0; i < count; i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, c: Math.random()>0.5 ? '#fed100' : '#ffffff' });
        }
    }

    function endGame() {
        if (isGameOver) return;
        isGameOver = true; currentDiboImg = images.fail;
        setTimeout(() => {
            overScreen.style.display = 'flex';
            document.getElementById('final-result').innerText = `PONTOS: ${score}\nMAX COMBO: ${maxCombo}`;
            document.getElementById('share-wa').onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(LOCALE.shareMsg(score, maxCombo))}`, '_blank');
        }, 1200);
    }

    function resetGame() { location.reload(); }

    /* 랭킹 시스템 */
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwpErHF4s5usetoSpUzL-ccEY0U9YmKn1whxiG_2o_6sQ0tH5rilKqVN92NXfELbjkn/exec";
    function openRankingInput() { document.getElementById('modal-rank-input').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function submitScore() {
        const nick = document.getElementById('nickname').value;
        if(!nick) return alert("Por favor, digite seu nickname!");
        const btn = document.getElementById('btn-save-rank');
        btn.disabled = true; btn.innerText = "ENVIANDO...";

        try {
            await fetch(scriptUrl, { method: "POST", mode: 'no-cors', body: JSON.stringify({ nickname: nick, score, combo: maxCombo }) });
            closeModal('modal-rank-input'); showRankingBoard();
        } catch (e) {
            alert("Erro ao conectar."); btn.disabled = false; btn.innerText = "SALVAR RECORDE";
        }
    }

    async function showRankingBoard() {
        document.getElementById('modal-rank-board').style.display = 'flex';
        const body = document.getElementById('rank-list-body');
        body.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 20px;'>Carregando...</td></tr>";
        try {
            const resp = await fetch(scriptUrl + "?t=" + new Date().getTime());
            const ranks = await resp.json();
            body.innerHTML = "";
            if (ranks.length === 0) { body.innerHTML = "<tr><td colspan='4'>Nenhum recorde ainda!</td></tr>"; return; }
            ranks.forEach((row, idx) => {
                if(idx >= 50) return;
                const tr = document.createElement('tr');
                if(idx === 0) tr.style.backgroundColor = "rgba(254, 209, 0, 0.1)";
                const medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : idx + 1;
                tr.innerHTML = `<td>${medal}</td><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td>`;
                body.innerHTML += tr.outerHTML;
            });
        } catch (e) { body.innerHTML = "<tr><td colspan='4'>Erro ao 불러오기.</td></tr>"; }
    }
    draw();
</script>
</body>
</html>
