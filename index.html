<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dibo: Rumo ao Hexa!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Kanit:ital,wght@0,800;1,800&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Kanit', sans-serif;
            background-color: #009739;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            /* 배경 이미지 설정 */
            background: url('background.png') no-repeat center center;
            background-size: cover; 
            background-color: #009739; 
        }

        canvas { display: block; touch-action: none; }

        /* 상단 UI */
        #ui-layer {
            position: absolute; top: 20px; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 10;
        }
        #score-board { 
            font-family: 'Luckiest Guy', cursive;
            font-size: 4.5rem; margin: 0; 
            color: #fed100;
            -webkit-text-stroke: 2px #002776;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }
        #combo-board { 
            font-size: 1.8rem; color: #ffffff; 
            font-weight: 800; font-style: italic;
            transition: transform 0.1s;
        }

        /* 판정 문구 */
        #judgment-text {
            position: absolute; width: 100%; text-align: center;
            top: 35%; font-family: 'Luckiest Guy', cursive;
            font-size: 4rem; opacity: 0; 
            transition: transform 0.2s, opacity 0.2s;
            pointer-events: none; z-index: 15;
            -webkit-text-stroke: 2px #002776;
        }

        /* 게임 오버 화면 */
        #game-over {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 30; text-align: center; padding: 20px;
            box-sizing: border-box;
        }

        .btn-action {
            width: 80%; max-width: 300px; padding: 18px; margin: 10px;
            border: none; border-radius: 50px; font-size: 1.4rem;
            font-family: 'Kanit', sans-serif; font-weight: 800;
            cursor: pointer; text-decoration: none;
            display: inline-block; transition: 0.2s;
        }
        .btn-retry { background: #fed100; color: #002776; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-link { background: #002776; color: white; font-size: 1.1rem; }

        #bottom-banner {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: #002776; color: white; font-weight: 800;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1rem; z-index: 25; border-top: 4px solid #fed100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <p id="score-board">0</p>
        <p id="combo-board">COMBO 0</p>
    </div>
    
    <div id="judgment-text">PERFEITO!</div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="game-over">
        <h1 style="color: #fed100; font-family: 'Luckiest Guy'; font-size: 4rem; margin-bottom: 0;">SÓ VAMOS!</h1>
        <h2 style="margin-top: 0; font-weight: 800;">Rumo ao Hexa!!!!</h2>
        <p id="final-result" style="font-size: 2rem; margin: 25px 0; font-weight: 800;"></p>
        
        <button class="btn-action btn-retry" onclick="resetGame()">JOGAR DE NOVO</button>
        <button class="btn-action btn-whatsapp" id="share-wa">COMPARTILHAR</button>
        <a href="https://www.instagram.com/deboacomdibo" class="btn-action btn-link" target="_blank">Aproveite a Copa conosco! ⚽</a>
    </div>

    <div id="bottom-banner">
        CLIQUE A TELA PARA COMEÇAR 🏆
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overScreen = document.getElementById('game-over');
    const judgmentEl = document.getElementById('judgment-text');
    const scoreEl = document.getElementById('score-board');
    const comboEl = document.getElementById('combo-board');

    // 이미지 로딩 처리
    const imgNames = ['idle', 'hit', 'fail', 'ball'];
    const images = {};
    let loadedCount = 0;

    imgNames.forEach(name => {
        images[name] = new Image();
        images[name].src = name === 'ball' ? 'ball.png' : `dibo_${name}.png`;
        images[name].onload = () => { loadedCount++; };
        images[name].onerror = () => { console.error(`Failed to load: ${name}`); };
    });

    let score = 0;
    let combo = 0;
    let isGameOver = false;
    let currentDiboImg = null; // 초기화는 나중에
    let particles = [];
    let gameActive = false;

    const DEFAULT_GRAVITY = 0.35;
    const HARD_GRAVITY = 0.55; 
    
    let ball = { x: 0, y: -100, r: 40, sx: 0, sy: 0, g: DEFAULT_GRAVITY, bounce: -13 };
    let dibo = { w: 220, h: 360, x: 0, y: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        dibo.x = canvas.width / 2 - dibo.w / 2;
        dibo.y = canvas.height - 300; 
        if(!gameActive) ball.x = canvas.width / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    function handleAction() {
        if (isGameOver) return;
        if (!gameActive) { 
            gameActive = true; 
            ball.y = 50; 
            currentDiboImg = images.idle;
            document.getElementById('bottom-banner').style.display = 'none';
            return; 
        }

        const distX = Math.abs(ball.x - (dibo.x + dibo.w / 2));
        const distY = Math.abs((ball.y + ball.r) - dibo.y);

        if (distX < 120 && distY < 85) {
            const isPerfect = distY < 45;
            
            if (isPerfect) {
                score += 10;
                combo++;
                if (combo > 0 && combo % 10 === 0) {
                    score += 50;
                    showJudgment('BÔNUS +50!', '#ff3300');
                    createParticles(ball.x, ball.y, 40);
                } else {
                    showJudgment('PERFEITO!', '#fed100');
                }
            } else {
                score += 5;
                combo = 0; 
                showJudgment('BOM!', '#ffffff');
            }

            if (score > 100) ball.g = HARD_GRAVITY;
            
            ball.sy = ball.bounce;
            ball.sx = (ball.x - (dibo.x + dibo.w / 2)) * 0.25;

            currentDiboImg = images.hit;
            setTimeout(() => { if(!isGameOver) currentDiboImg = images.idle; }, 300);

            createParticles(ball.x, ball.y, isPerfect ? 20 : 10);
            comboEl.style.transform = 'scale(1.3)';
            setTimeout(() => { comboEl.style.transform = 'scale(1)'; }, 100);
        }
    }

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });
    canvas.addEventListener('mousedown', handleAction);

    function showJudgment(txt, color) {
        judgmentEl.innerText = txt;
        judgmentEl.style.color = color;
        judgmentEl.style.opacity = '1';
        judgmentEl.style.transform = 'scale(1.3)';
        setTimeout(() => { 
            judgmentEl.style.opacity = '0'; 
            judgmentEl.style.transform = 'scale(1)';
        }, 500);
    }

    function createParticles(x, y, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1,
                c: Math.random() > 0.5 ? '#fed100' : '#ffffff'
            });
        }
    }

    function update() {
        if (!gameActive || isGameOver) return;
        ball.sy += ball.g;
        ball.x += ball.sx;
        ball.y += ball.sy;
        if (ball.x < ball.r || ball.x > canvas.width - ball.r) ball.sx *= -1;
        if (ball.y > canvas.height - 100) endGame();

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if (p.life <= 0) particles.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const drawImg = currentDiboImg || images.idle;
        if(drawImg) ctx.drawImage(drawImg, dibo.x, dibo.y, dibo.w, dibo.h);

        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(ball.x * 0.03);
        if(images.ball) ctx.drawImage(images.ball, -ball.r, -ball.r, ball.r*2, ball.r*2);
        ctx.restore();

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.c;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        scoreEl.innerText = score;
        comboEl.innerText = `COMBO ${combo}`;
        scoreEl.style.color = score > 100 ? '#ff3300' : '#fed100';

        update();
        requestAnimationFrame(draw);
    }

    function endGame() {
        if (isGameOver) return;
        isGameOver = true;
        currentDiboImg = images.fail; 
        
        setTimeout(() => {
            overScreen.style.display = 'flex';
            document.getElementById('final-result').innerText = `GOLS: ${score} | COMBO MÁX: ${combo}`;
        }, 1500);
        
        const gameUrl = window.location.href;
        const msg = encodeURIComponent(`Marquei ${score} gols e fiz ${combo} combos perfeitos! 🇧🇷⚽ Tenta me superar aqui: ${gameUrl}`);
        document.getElementById('share-wa').onclick = () => {
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };
    }

    function resetGame() {
        score = 0; combo = 0; isGameOver = false; gameActive = false;
        ball = { x: canvas.width / 2, y: -100, r: 40, sx: 0, sy: 0, g: DEFAULT_GRAVITY, bounce: -13 };
        currentDiboImg = images.idle;
        overScreen.style.display = 'none';
        particles = [];
    }

    // 루프 시작
    draw();
</script>
</body>
</html>
